<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tablas</title>
</head>
<body>
    <h1>Tablas</h1>
    <table>
        <!--Encabezado para los datos de la tabla-->
        <thead>
            <tr>
                <th>Dato tabular 1 de la fila 1</th>
                <th>Dato tabular 2 de la fila 1</th>
                <th>Dato tabular 3 de la fila 1</th>
            </tr>
        </thead>
        <tbody>
            <!--Fila 01-->
            <tr>
                <td>Dato tabular 1 de la fila 1</td>
                <td>Dato tabular 2 de la fila 1</td>
                <td>Dato tabular 3 de la fila 1</td>
            </tr>
            <!--Fila 02-->
            <tr>
                <td>Dato tabular 1 de la fila 2</td>
                <td>Dato tabular 2 de la fila 2</td>
                <td>Dato tabular 3 de la fila 2</td>
            </tr>
        </tbody>
        <!--Resumena de la tabla-->
        <tfoot>
            <tr>
                <th class="header_total">Total</th>
                <td class="data_total" colspan="2">$50</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
