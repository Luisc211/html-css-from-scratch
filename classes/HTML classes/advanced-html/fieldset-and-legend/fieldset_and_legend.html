<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fieldset_and_legend.css">
    <title>Fieldset y legend (simples)</title>
</head>
<body>
    <p>Los fieldset y legend nos ayudan a etiquetar por ejemplo en un formulario los tipos de datos
        que solicitamos al usuario, como información básica, de contacto etc.
    </p>
    <form action="">
        <fieldset>
            <legend>Información básica</legend>
            <input type="text" placeholder="Nombre(s)">
            <input type="text" placeholder="Apellido(s)">
            <input type="number" placeholder="Edad">
        </fieldset>
        <fieldset>
            <legend>Información de contacto</legend>
            <input type="email" placeholder="Email">
            <input type="tel" placeholder="Teléfono">
        </fieldset>
    </form>
</body>
</html>
